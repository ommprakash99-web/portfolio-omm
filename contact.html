<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background: rgb(0,0,28);
min-height:100vh;
}

/* Navigation */

.navigation-bar{
display:flex;
justify-content:center;
padding:20px;
border-radius:10px;
margin-top:12px;
}

ul{
list-style:none;
display:flex;
gap:5rem;
text-align:center;
}

a{
text-decoration:none;
color:white;
font-weight:bold;
font-size:larger;
transition: transform 0.3s ease;
}

a:hover{
color:orange;
transform:scale(1.1);
}

/* Contact container */

.main-container{
display:flex;
flex-direction:column;
align-items:center;
}

.contact-container{
background:#fff;
width:90%;
max-width:450px;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
margin-top:50px;
}

.contact-container h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

/* Form */

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
margin-bottom:6px;
color:#555;
font-size:14px;
}

.form-group input,
.form-group textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
outline:none;
font-size:14px;
}

.form-group input:focus,
.form-group textarea:focus{
border-color:#667eea;
}

textarea{
resize:none;
height:100px;
}

/* Button */

.btn{
width:100%;
padding:12px;
background:#667eea;
color:#fff;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:background 0.3s ease;
}

.btn:hover{
background:#5563d6;
}

/* Contact info */

.contact-info{
text-align:center;
margin-top:20px;
font-size:14px;
color:#666;
}

</style>

</head>

<body>

<section class="main-container">

<nav class="navigation-bar">

<div class="container">

<ul>

<a href="./index.html"><li>HOME</li></a>
<a href="./about.html"><li>ABOUT</li></a>
<a href="./skills.html"><li>SKILLS</li></a>
<a href="./project.html"><li>PROJECTS</li></a>
<a href="./testimonials.html"><li>TESTIMONIALS</li></a>
<a href="./service.html"><li>SERVICE</li></a>
<a href="./contact.html"><li>CONTACT</li></a>

</ul>

</div>

</nav>

<div class="contact-container">

<h2>
Contact Us <br>
<span style="font-weight:100;font-size:20px;">
get in touch ❤️
</span>
</h2>

<form>

<div class="form-group">
<label>Your Name</label>
<input type="text" placeholder="Enter your name" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Message</label>
<textarea placeholder="Type your message..." required></textarea>
</div>

<button class="btn" type="submit">
Send Message
</button>

</form>

<div class="contact-info">

📧 ommprakashdasomm94@gmail.com <br>
📞 +91 82609 81661 (Random)

</div>

</div>

</section>

</body>
</html>
